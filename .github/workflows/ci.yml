name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly dependency vulnerability sweep (Mondays 06:17 UTC). Picks up
    # newly-disclosed CVEs in pinned deps even when no code has changed.
    - cron: "17 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6.0.0

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v6.0.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Tests
        run: pytest -ra

  # Type-checking runs ONCE on a single interpreter, not per matrix leg: type
  # analysis is version-portable (pyproject sets mypy's python_version), and the
  # numpy stub baseline we pin for determinism (2.5.0) requires Python >=3.12 —
  # so it can't be installed on the 3.10/3.11 test legs. numpy's bundled stubs
  # change between minor releases (2.2 vs 2.5), flipping the same cast() between
  # required (no-any-return) and redundant (redundant-cast) under --strict, so a
  # single pinned baseline keeps the check deterministic. The matrix above still
  # runs the tests on each interpreter's own resolved numpy.
  type-check:
    name: type-check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v6.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Type-check
        run: |
          pip install 'numpy==2.5.0'
          mypy src/muninn

  benchmark:
    name: benchmarks (py3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v6.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run benchmarks
        # --benchmark-only: run only benchmark tests (skip regular tests)
        # --benchmark-json: save results for artifact upload
        # When .benchmarks/baseline.json exists (committed), --benchmark-compare
        # enforces the 25% regression gate. Until a baseline is committed, this
        # step runs in observation mode and saves the results as an artifact.
        run: |
          if [ -f .benchmarks/baseline.json ]; then
            pytest tests/bench_client.py \
              --benchmark-only \
              --benchmark-compare=.benchmarks/baseline.json \
              --benchmark-fail-max-delta-mean=0.25 \
              --benchmark-json=benchmark-results.json \
              -v
          else
            pytest tests/bench_client.py \
              --benchmark-only \
              --benchmark-json=benchmark-results.json \
              -v
            echo "No baseline found. To enable the regression gate, run:"
            echo "  pytest tests/bench_client.py --benchmark-save=baseline --benchmark-only"
            echo "then commit .benchmarks/baseline.json"
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        if: always()
        with:
          name: benchmark-results-py3.12
          path: benchmark-results.json
          retention-days: 30

  pip-audit:
    name: pip-audit (dependency CVE scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v6.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and pip-audit
        run: |
          python -m pip install --upgrade pip
          # Install the package so resolved runtime deps are audited, plus the
          # optional extras that ship code we publish/import.
          pip install -e ".[dev,notebooks,cache,dashboard]"
          pip install pip-audit

      - name: Audit installed dependencies for known CVEs
        # Audits the resolved environment (transitive deps included). Fails the
        # job on any known vulnerability; weekly schedule catches new CVEs even
        # when no code changes. Use `--ignore-vuln <id>` here to triage a
        # specific advisory if/when an unfixable transitive CVE blocks CI.
        #
        # CVE-2025-69872 (diskcache <=5.6.3): diskcache uses pickle for value
        # serialization, so an attacker with WRITE ACCESS to the on-disk cache
        # directory can achieve code execution when the cache is read. There is
        # NO fixed release (5.6.3 is the latest; upstream treats pickle as the
        # documented default), so it cannot be remediated by a version bump.
        # It is non-applicable here: diskcache is an opt-in extra ([cache]),
        # only audited because this job installs every extra; muninn stores only
        # plain list[dict] JSON-style payloads (see src/muninn/_cache.py) into a
        # caller-owned local directory, and write access to that directory is
        # already a local trust boundary equivalent to running arbitrary code.
        # Documented, scoped ignore — re-evaluate if diskcache ships a fix.
        run: pip-audit --strict --desc --ignore-vuln CVE-2025-69872
