site_name: muninn-py
site_description: Python research SDK for the Muninn event-native feature platform
site_url: https://lgreene03.github.io/muninn-py
repo_url: https://github.com/lgreene03/muninn-py
repo_name: lgreene03/muninn-py
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - content.code.copy
    - navigation.instant
    - navigation.top
    - navigation.sections
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            heading_level: 2
            members_order: source

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
  - admonition
  - pymdownx.details
  - tables

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
    - Client: api/client.md
    - Async Client: api/async_client.md
    - Models: api/models.md
    - Exceptions: api/exceptions.md
    - Notebook helpers: api/notebook.md
  - Notebooks: notebooks.md
  - Changelog: changelog.md
